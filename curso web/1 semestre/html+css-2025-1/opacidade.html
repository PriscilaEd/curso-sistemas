<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Opacidade</title>
    <style>
        div {
        width: 100px;
        height: 100px; 
        background-color: red;
        }

        .div1 {
            opacity: 0;
        }

        .div2 {
            opacity: 0.25;
        }

        .div3 {
            opacity: 0.5;
        }

        .div4 {
            opacity: 0.75;
        }

        .div5 {
            opacity: 1;
        }

        .opa {
            width: 60%;
            opacity: 30%;
        }

        .opa:hover{
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="div1"></div>
    <div class="div2"></div>
    <div class="div3"></div>
    <div class="div4"></div>
    <div class="div5"></div>

    <img src="img/balao.jpg" alt="balao" class="opa">
</body>
</html>
