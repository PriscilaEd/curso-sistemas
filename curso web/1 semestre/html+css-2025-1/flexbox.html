<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        #area {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 1em;
        }

        .flex-cotainer {
            display: flex;
            flex-wrap: wrap;
            flex-direction: row;
           /* justify-content: space-evenly; */
           align-items: flex-start;
            justify-content: space-around;
            align-content: flex-end;

        }

        .d1 {
            border: 1px solid black;
            margin-bottom: 10px;
            margin-right: 10px;
            padding: 80px 140px;
        }
    </style>
</head>
<body>
    <div id="area" class="flex-container">
    <div class="d1">1</div>
    <div class="d1">2</div>
    <div class="d1">3</div>
    <div class="d1">4</div>
    <div class="d1">5</div>
    <div class="d1">6</div>
    </div>
</body>
</html>
