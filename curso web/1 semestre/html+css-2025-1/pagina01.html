<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Web - pagina 01</title>
    <style>
        h1 {
        color: orange;
        background-color: black; 
        }
        p {
        color: blue;
        }
        
    </style>
</head>
<body>
    <h1>Página 01 - testando CSS</h1>
    <p>Podemos aplicar propriedades CSS a elementos HTML de três maneiras</p>
    <p>Através do atributo style</p>
    <p>Usando a tag style internamente</p>
    <p>Usando arquivo externo</p>
    <p style="color: green;"> Usando a tag style internamente </p>
</body>
</html>
