<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tansformação</title>
    <style>
        div {
            margin: 70px;
            border: 1px solid black;
            background-color: aquamarine;
            width: 100px;
            height: 100px;
        }

        #div1 {
            transform: translate(50px, -20px);
            -webkit-transform: translate(50px, -20px);
        }

         #div2 {
            transform: scale(0.7, 2);
            -webkit-transform: scale(0.7, 2);
        }

        #div3 {
            transform: rotate(15deg);
            -webkit-transform: rotate(15deg);
        }

        #div4 {
            transform: skew(10deg, -45deg);
            -webkit-transform: skew(10deg, -45deg);
        }
    </style>
</head>
<body>
    <div id="div1">Translate()</div>
    <div id="div2">Scale()</div>
    <div id="div3">rotate()</div>
    <div id="div4">skew()</div>
</body>
</html>
