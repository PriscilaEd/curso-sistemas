<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Elementos de formatação de textos HTML</h1>
    <p>
       <b>Texto em negrito</b> <br>
       <strong>Texto importante [negrito]</strong> <br>
       <i>Texto em itálico</i> <br>
       <em>Texto enfatizado [itálico]</em> <br>
       <mark>Texto marcado</mark> <br>
       <small>Texto menor</small> <br>
       <del>Texto deletado [riscado]</del> <br>
       <ins>Texto inserido</ins> <br>
       texto sobrescrito <sup>5</sup>
       texto subscrito <sub>4</sub>

    </p>
</body>
</html>
