<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Formulários</h1>
    
    <label action="#" method="post">
        <input type="search" placeholder="Buscar"
        value="Brasil" ><br>

        <textarea name="msg" id="msg"
       placeholder="Digite sua mensagem aqui" rows="10" cols="60">fastfjk</textarea>
        <br>
        <br>
        <input type="checkbox" id="java_id"
         name="linguagens" value="Java" >
         <label for="java_id">Java</label>

         <input type="checkbox" id="csharp"
         name="linguagens" value="csharp">
         <label for="csharp">C#</label>
            
         <input type="checkbox" id="php_id"
         name="linguagens" value="php" checked>
         <label for="php_id">PHP#</label>

         <input type="checkbox" id="ruby_id"
         name="linguagens" value="ruby">
         <label for="ruby_id">Ruby</label>

         <input type="checkbox" id="perl_id"
         name="linguagens" value="perl">
         <label for="perl_id">Perl</label> <br> <br>

         <input type="radio" id="SP" name="time-preferido" value="São Paulo">
         <label for="SP">São Paulo</label> <br> <br>

         <input type="radio" id="CO" name="time-preferido" value="Corinthians">
         <label for="CO">Corinthians</label> <br> <br>

         <input type="radio" id="FA" name="time-preferido" value="Flamengo">
         <label for="FA">Flamengo</label> <br> <br>

         <input type="radio" id="PA" name="time-preferido" value="Palmeiras">
         <label for="PA">Palmeiras</label> <br> <br>

         <input type="radio" id="SA" name="time-preferido" value="Santos">
         <label for="SA">Santos</label> <br> <br>


         <label for="cor_id">Escolha uma cor</label>
         <input type="color" name="cor" id="cor_id"> <br> <br>

         <input type="submit" value="Enviar">
         <input type="reset" value="Reiniciar" >

    </label>
</body>
    </html>
