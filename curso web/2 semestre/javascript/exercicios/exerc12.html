<script>
    // verificar o dia da semana
    const dia = prompt('Digite o dia da semana (Segunda, Terça, Quarta...):')

    switch(dia) {
        case 'Segunda':
            alert('Dia de começar a semana com força!')
            break
        case 'Terça':
            alert('Metade do caminho para quarta')
            break
        case 'Quarta':
            alert('Dia do meio da semana')
            break
        case 'Quinta':
            alert('Quase sexta!')
            break
        case 'Sexta':
            alert('Sexta')
            break
        case 'Sábado':
            alert('Dia de curtir o final de semana')
            break
        case 'Domingo':
            alert('Último dia!')
            break
        default:
            alert('Digite um dia válido')
    }
</script>
