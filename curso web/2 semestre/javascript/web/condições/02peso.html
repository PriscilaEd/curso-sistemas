<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programa Cálculo do Peso Ideal</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-6 text-center">
        <img src="img/peso.jpg" alt="Peso" class="img-fluid w-50">
        </div>
        <div class="col-6">
        <h1>Programa Cálculo do Peso Ideal</h1>
        <form>
          <p>Nome:
            <input type="text" id="inNome" required>
          </p>
          <p>Sexo:
            <input type="radio" name="sexo" id="inMasculino" required>
            Masculino
            <input type="radio" name="sexo" id="inFeminino" required>
            Feminino
          </p>
          <p>Altura:
            <input type="number" step="0.1" min="0" max="10" id="inAltura" required>
          </p>
          <input type="submit" value="Calcular o peso ideal">
          <input type="reset" value="Limpar campos">
        </form>
        <p>&nbsp;</p>
        <h3></h3>
      </div>
    </div>
  </div>
  <script src="js/peso.js"></script>
</body>

</html>
